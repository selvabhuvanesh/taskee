<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>taskoot - Family Task Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(160deg, #c0f020, #34a810);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .card {
            text-align: center;
            padding: 60px 40px;
            max-width: 480px;
        }
        h1 {
            font-size: 4em;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 8px;
            text-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }
        .tagline {
            font-size: 1.2em;
            opacity: 0.9;
            margin-bottom: 40px;
            line-height: 1.5;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
            align-items: center;
        }
        .links a {
            color: white;
            text-decoration: none;
            font-size: 1em;
            font-weight: 500;
            padding: 14px 32px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 14px;
            width: 240px;
            transition: all 0.2s;
        }
        .links a:hover {
            background: rgba(255,255,255,0.2);
            border-color: white;
        }
        .footer {
            margin-top: 48px;
            font-size: 0.85em;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>taskoot</h1>
        <p class="tagline">The fun way for families to manage tasks, earn coins, and celebrate together.</p>
        <div class="links">
            <a href="privacy.html">Privacy Policy</a>
